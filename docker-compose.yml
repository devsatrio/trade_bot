version: '3.8'

services:
  web-app:
    build: 
      context: ./web-app
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./web-app:/app
      - /app/node_modules
      - /app/.next
    environment:
      - DATABASE_URL=/app/data/trading_bot.db
      - ENGINE_URL=http://engine:8000
    env_file:
      - ./web-app/.env
    depends_on:
      - engine
    networks:
      - bot-network
    restart: unless-stopped

  engine:
    build:
      context: ./engine
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./engine:/app
    environment:
      - DATABASE_URL=/app/data/trading_bot.db
    networks:
      - bot-network
    restart: unless-stopped

networks:
  bot-network:
    driver: bridge
